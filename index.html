<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/vite.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Modern Meat</title>
  </head>
  <body>
    <div id="splash-screen" style="position:fixed;top:0;left:0;width:100%;height:100%;background:#050505;display:flex;flex-direction:column;align-items:center;justify-content:center;z-index:9999;transition:opacity 0.8s cubic-bezier(0.4, 0, 0.2, 1);pointer-events:none;">
      <div style="position:relative;display:flex;flex-direction:column;align-items:center;gap:30px;">
        <div style="width:100px;height:100px;position:relative;">
          <svg viewBox="0 0 24 24" fill="none" stroke="#D4AF37" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round" style="width:100%;height:100%;filter:drop-shadow(0 0 15px rgba(212, 175, 55, 0.4)); animation: splashPulse 2.5s infinite ease-in-out;">
            <path d="M8.5 14.5A2.5 2.5 0 0 0 11 12c0-1.38-.5-2-1-3-1.072-2.143-.224-4.054 2-6 .5 2.5 2 4.9 4 6.5 2 1.6 3 3.5 3 5.5a7 7 0 1 1-14 0c0-1.153.433-2.294 1-3a2.5 2.5 0 0 0 2.5 2.5z"></path>
          </svg>
        </div>
        <div style="color:#D4AF37;font-family:'Playfair Display', serif;font-size:1.5rem;letter-spacing:6px;text-transform:uppercase;opacity:0;animation: splashFadeIn 1.5s forwards 0.5s;text-shadow: 0 0 20px rgba(212, 175, 55, 0.3);">Modern Meat</div>
      </div>
      <style>
        @keyframes splashPulse {
          0% { transform: scale(0.95); opacity: 0.7; filter: drop-shadow(0 0 5px rgba(212, 175, 55, 0.2)); }
          50% { transform: scale(1.05); opacity: 1; filter: drop-shadow(0 0 30px rgba(212, 175, 55, 0.6)); }
          100% { transform: scale(0.95); opacity: 0.7; filter: drop-shadow(0 0 5px rgba(212, 175, 55, 0.2)); }
        }
        @keyframes splashFadeIn {
          from { opacity: 0; transform: translateY(10px); }
          to { opacity: 0.9; transform: translateY(0); }
        }
        body { background: #050505; margin: 0; }
      </style>
    </div>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
